    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("form");
            const username = document.getElementById("username");
            const email = document.getElementById("email");
            const password = document.getElementById("password");
            const confirmPassword = document.getElementById("confirPass");
            const usernameError = document.getElementById("username-error");
            const emailError = document.getElementById("email-error");
            const passwordError = document.getElementById("password-error");
            const confirmPasswordError = document.getElementById("confirmPass-error");

            function validateUsername() {
                if (username.value.trim() === "") {
                    username.classList.add("error");
                    usernameError.textContent = "Username is required";
                    var element = document.getElementById('username');
                    element.style.borderColor = '#ff3860';
                    return false;
                } else {
                    username.classList.remove("error");
                    usernameError.textContent = "";
                    var element = document.getElementById('username');
                    element.style.borderColor = '#f0f0f0';
                    return true;
                }
            }

            function validateEmail() {
                var email = document.getElementById("email");
                var text = document.getElementById("text");
                var pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

                if (email.value.match(pattern)) {
                    textE.innerHTML = "Valid email";
                    email.style.borderColor = "#90EE90";
                    text.style.color = "#90EE90";
                }
                else if (!email.value.match(pattern)) {
                    textE.innerHTML = "invalid-email Address";
                    email.style.borderColor = "#8b0000";
                    text.style.color = "#8b0000";
                }
            }

            function validatePassword() {
                if (password.value.trim() === "") {
                    password.classList.add("error");
                    passwordError.textContent = "Password is required";
                    var element = document.getElementById('password');
                    element.style.borderColor = '#ff3860';
                    return false;
                } else if (password.value.length < 8) {
                    password.classList.add("error");
                    passwordError.textContent = "Password must be at least 8 characters";
                    var element = document.getElementById('password');
                    element.style.borderColor = '#ff3860';
                    return false;
                } else {
                    password.classList.remove("error");
                    passwordError.textContent = "";
                    var element = document.getElementById('password');
                    element.style.borderColor = '#f0f0f0';
                    return true;
                }

            }

            function validateConfirmPassword() {
                if (confirmPassword.value.trim() === "") {
                    confirmPassword.classList.add("error");
                    confirmPasswordError.textContent = "Confirm Password is required";
                    var element = document.getElementById('confirmPass');
                    element.style.borderColor = '#ff3860';
                    return false;
                } else if (confirmPassword.value !== password.value) {
                    confirmPassword.classList.add("error");
                    confirmPasswordError.textContent = "Passwords do not match";
                    var element = document.getElementById('confirmPass');
                    element.style.borderColor = '#ff3860';
                    return false;
                } else {
                    confirmPassword.classList.remove("error");
                    confirmPasswordError.textContent = "";
                    var element = document.getElementById('confirmPass');
                    element.style.borderColor = '#f0f0f0';
                    return true;
                }
            }

            function validateForm() {
                const isUsernameValid = validateUsername();
                const isEmailValid = validateEmail();
                const isPasswordValid = validatePassword();
                const isConfirmPasswordValid = validateConfirmPassword();

                return isUsernameValid && isEmailValid && isPasswordValid && isConfirmPasswordValid;

            }

            form.addEventListener("submit", function (e) {
      if (!validateForm()) {
        e.preventDefault(); 
      }
    });
  });
